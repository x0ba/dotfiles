# vim:ft=yaml:fenc=utf-8:fdm=marker
# tmux plugin manager
.config/tmux/plugins/tpm:
  type: git-repo
  url: "https://github.com/tmux-plugins/tpm"
  refreshPeriod: 168h

# wezterm bar plugin
.config/wezterm/bar:
  type: git-repo
  url: "https://github.com/nekowinston/wezterm-bar"
  refreshPeriod: 168h

# catppuccin for wezterm
.config/wezterm/catppuccin:
  type: git-repo
  url: "https://github.com/catppuccin/wezterm"
  refreshPeriod: 168h
